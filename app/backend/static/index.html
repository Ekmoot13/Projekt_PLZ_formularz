<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polska Liga Żeglarska</title>
<link rel="stylesheet" href="/static/style.css">
<style>
body { background: none; overflow: hidden; }
body::before { display: none; }

/* ─── TŁO SCENY ─────────────────────────────────────────── */
#scene {
    position: fixed; inset: 0; z-index: 0; overflow: hidden;
    background: linear-gradient(180deg,
        #4a8fc4 0%, #6bbce0 18%, #8ecde9 38%,
        #aaddf4 55%, #c2ecfb 63%,
        #4a9abb 63%, #2c6e8a 80%, #1a4f6a 100%);
}

/* ─── FALE WODY ─────────────────────────────────────────── */
#waves-wrap {
    position: absolute; left: 0; right: 0;
    bottom: 0; height: 40%; overflow: hidden; z-index: 4;
    pointer-events: none;
}
#wave-svg { width: 200%; height: 100%; animation: wave-scroll 9s linear infinite; }
@keyframes wave-scroll { from{transform:translateX(0)} to{transform:translateX(-50%)} }

/* ─── WYSPY ──────────────────────────────────────────────── */
/* Wyspy są duże, sięgają od dołu ekranu do ~20% od góry */
.island-wrap {
    position: absolute;
    bottom: 0;
    z-index: 3;
    pointer-events: none;
    /* szerokość rośnie gdy ekran maleje */
    width: clamp(240px, 28vw, 420px);
    /* KLUCZOWE: explicite wysokość by wyspa wystawała nad wodę */
    height: 80vh;
}
#island-l { left: 0; }
#island-r { right: 0; transform: scaleX(-1); }

/* ─── MEWY ───────────────────────────────────────────────── */
#gulls { position: absolute; inset: 0; pointer-events: none; z-index: 5; }
.gull  { position: absolute; top: var(--gy); }
.gull:not(.rtl) { animation: gfly  var(--gd) linear var(--gx) infinite; }
.gull.rtl       { animation: gflyr var(--gd) linear var(--gx) infinite; }
@keyframes gfly  { from{transform:translateX(-90px) scale(var(--gs,1))} to{transform:translateX(calc(100vw + 90px)) scale(var(--gs,1))} }
@keyframes gflyr { from{transform:translateX(calc(100vw + 90px)) scale(var(--gs,1)) scaleX(-1)} to{transform:translateX(-90px) scale(var(--gs,1)) scaleX(-1)} }
.gull .wl { transform-origin: 20px 8px; animation: gwl var(--gf,.55s) ease-in-out infinite alternate; }
.gull .wr { transform-origin: 20px 8px; animation: gwr var(--gf,.55s) ease-in-out infinite alternate; }
@keyframes gwl { from{transform:rotate(-26deg)} to{transform:rotate(16deg)}  }
@keyframes gwr { from{transform:rotate(26deg)}  to{transform:rotate(-16deg)} }

/* ─── ŁÓDKA ──────────────────────────────────────────────── */
#boat-wrap {
    position: fixed; top: 0; left: 0; z-index: 50;
    pointer-events: none; width: 0; height: 0; overflow: visible;
}
#boat {
    transform-origin: 40px 44px;
    will-change: transform;
}

/* ─── PAGE ───────────────────────────────────────────────── */
.page { position: relative; z-index: 20; pointer-events: none; }
.card, .card *, a, button, input, select { pointer-events: all; }
.plz-logo { pointer-events: none; }
</style>
</head>

<script>
(function () {
'use strict';

/* ── Stałe ───────────────────────────────── */
const LERP      = 0.048;
const BOB_AMP   = 7,   BOB_SPD  = 0.0018;
const TILT_AMP  = 3,   TILT_SPD = 0.0024;
const FLIP_SPD  = 0.07;
const MARGIN    = 80;  // odległość od krawędzi ekranu

/* ── DOM ─────────────────────────────────── */
const boatEl = document.getElementById('boat');

/* ── Stan ────────────────────────────────── */
const s = {
    x: window.innerWidth * 0.5,
    prevX: window.innerWidth * 0.5,
    facing: 1, dispFacing: 1,
};
let mouseX = window.innerWidth * 0.5;
let t0 = null;

/* ── Helpers ─────────────────────────────── */
const mobile = () => window.innerWidth < 768;
const waterY = () => window.innerHeight * 0.63 - 34;

/* ── Mysz / touch ────────────────────────── */
document.addEventListener('mousemove', e => { mouseX = e.clientX; });
document.addEventListener('touchmove', e => {
    if (e.touches.length) mouseX = e.touches[0].clientX;
}, { passive: true });

/* ── Główna pętla animacji ───────────────── */
function loop(ts) {
    if (!t0) t0 = ts;
    const t  = ts - t0;
    const wY = waterY();

    s.prevX = s.x;

    if (mobile()) {
        /* Na mobile — łódka płynie prawo-lewo */
        s.x      = window.innerWidth / 2 + Math.sin(t * 0.0014) * window.innerWidth * 0.32;
        s.facing = Math.cos(t * 0.0014) > 0 ? 1 : -1;
    } else {
        /* Desktop — podążaj za myszą, z marginesem od krawędzi */
        const target = Math.max(MARGIN, Math.min(window.innerWidth - MARGIN, mouseX));
        s.x += (target - s.x) * LERP;
        const dx = s.x - s.prevX;
        if (Math.abs(dx) > 0.35) s.facing = dx > 0 ? 1 : -1;
    }

    s.dispFacing += (s.facing - s.dispFacing) * FLIP_SPD;

    const bob  = Math.sin(t * BOB_SPD)  * BOB_AMP;
    const tilt = Math.sin(t * TILT_SPD) * TILT_AMP + (s.x - s.prevX) * 0.38;

    boatEl.style.transform =
        `translate(${s.x - 40}px,${wY + bob}px) rotate(${tilt}deg) scaleX(${s.dispFacing})`;

    requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

})();
</script>
